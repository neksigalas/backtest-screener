name: 3BE — Daily Report (23:30 Athens)

on:
  schedule:
    # 20:30 UTC = 23:30 Athens (EEST = UTC+3), weekdays
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (latest main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily ETF report
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO:          ${{ secrets.REPORT_TO }}
        run: python -m etf_trader.report
